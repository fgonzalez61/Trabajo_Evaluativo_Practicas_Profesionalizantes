<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/styles.css">
    <title>Mi Tienda</title>
</head>
<body>

    <header class="barra-superior">
        <div class="logo">SHOP</div>
        <nav>
            <ul class="menu">
                <li>Inicio</li>
                <li>Productos</li>
                <li>Categorías</li>
                <li>Contacto</li>
            </ul>
        </nav>
        <button class="boton-login">Iniciar sesión</button>
    </header>

    <div class="banner-ofertas">
        <h1>¡OFERTAS EXCLUSIVAS!</h1>
        <p>Hasta 40% OFF</p>
        <button class="boton-comprar">COMPRAR AHORA</button>
    </div>

    <section class="contenedor-productos">
        <h2>MÁS VENDIDOS</h2>
        <div class="lista-productos">
            <div class="tarjeta-producto">
                <img src="img/auriculares.png" alt="Auriculares">
                <h3>Auriculares Pro</h3>
                <p>$45.990</p>
                <button class="boton-ver">Ver producto</button>
            </div>
            </div>
    </section>

    <footer class="pie-de-pagina">
        <div class="columna">Contacto</div>
        <div class="columna">Dirección</div>
        <div class="columna">Sucursales</div>
        <div class="columna">Cupones</div>
    </footer>

</body>
</html>
